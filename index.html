<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Playground</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#282a36}
body{font-family:'JetBrains Mono',monospace;display:flex;flex-direction:column}

/* ── Toolbar ── */
#bar{display:flex;align-items:center;gap:8px;padding:9px 14px;background:#21222c;border-bottom:1px solid #44475a;flex-shrink:0;flex-wrap:wrap}
#logo{font-family:'Syne',system-ui;font-size:15px;font-weight:600;color:#bd93f9;margin-right:4px;letter-spacing:-.3px}
.bar-group{display:flex;align-items:center;gap:5px}
.bar-group label{font-size:11px;color:#6272a4;font-family:'Syne',system-ui;white-space:nowrap}
.sp{flex:1;min-width:4px}
.ibtn{padding:5px 11px;background:transparent;border:1px solid #44475a;border-radius:6px;color:#6272a4;font-size:12px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:color .12s,border-color .12s;white-space:nowrap;line-height:1}
.ibtn:hover{color:#f8f8f2;border-color:#6272a4}
.ibtn.on{border-color:#bd93f9;color:#bd93f9}
.ibtn.vis{border-color:#50fa7b;color:#50fa7b}
.ibtn.ex-on{border-color:#ffb86c;color:#ffb86c}
.rbtn{padding:6px 18px;background:#bd93f9;color:#282a36;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-family:'Syne',system-ui;font-weight:600;transition:background .12s}
.rbtn:hover{background:#cfa9fa}.rbtn:active{transform:scale(.97)}

#ar-bar{height:2px;background:#44475a;flex-shrink:0;position:relative;overflow:hidden}
#ar-prog{height:100%;width:0%;background:#bd93f9;position:absolute;top:0;left:0}

/* ── Outer shell ── */
#shell{display:flex;flex:1;overflow:hidden;min-height:0}

/* ── Exercises sidebar ── */
#ex-sidebar{
  width:300px;min-width:300px;background:#1e1f29;
  border-right:1px solid #44475a;display:flex;flex-direction:column;
  overflow:hidden;transition:width .2s,min-width .2s;flex-shrink:0;
}
#ex-sidebar.closed{width:0;min-width:0;border-right:none}
#ex-split{width:5px;background:#383a4a;flex-shrink:0;cursor:ew-resize;z-index:20;transition:background .12s;display:none}
#ex-split:hover,#ex-split.active{background:#ffb86c}
#ex-hdr{padding:12px 14px 8px;background:#21222c;border-bottom:1px solid #44475a;flex-shrink:0}
#ex-hdr h2{font-family:'Syne',system-ui;font-size:13px;font-weight:600;color:#ffb86c;letter-spacing:.3px}
#ex-hdr p{font-size:11px;color:#6272a4;margin-top:3px;font-family:'Syne',system-ui}
#progress-row{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-top:7px}
#progress-summary{font-size:10.5px;color:#50fa7b;font-family:'Syne',system-ui}

/* category tabs */
#ex-cats{display:flex;gap:4px;padding:8px 10px;background:#21222c;border-bottom:1px solid #44475a;flex-shrink:0;flex-wrap:wrap}
.cat-btn{padding:3px 10px;border-radius:4px;font-size:11px;cursor:pointer;background:transparent;border:1px solid #44475a;color:#6272a4;font-family:'Syne',system-ui;transition:all .12s}
.cat-btn:hover{color:#f8f8f2;border-color:#6272a4}
.cat-btn.on{background:#44475a;color:#ffb86c;border-color:#ffb86c}

/* exercise list */
#ex-list{flex:1;overflow-y:auto;padding:8px}
.ex-item{
  padding:10px 12px;border-radius:8px;cursor:pointer;margin-bottom:6px;
  border:1px solid #44475a;background:#282a36;transition:all .15s;
}
.ex-item:hover{border-color:#6272a4;background:#2d2f3f}
.ex-item.active{border-color:#ffb86c;background:#2d2f3f}
.ex-item.done{border-color:#50fa7b}
.ex-title{font-size:12.5px;color:#f8f8f2;font-family:'Syne',system-ui;font-weight:500;display:flex;align-items:center;gap:6px}
.ex-title .tick{color:#50fa7b;font-size:11px;display:none}
.ex-item.done .tick{display:inline}
.mark-done-btn{margin-left:auto;padding:2px 7px;border-radius:4px;font-size:10px;cursor:pointer;font-family:'Syne',system-ui;background:transparent;border:1px solid #44475a;color:#6272a4;transition:all .15s;flex-shrink:0;line-height:1.4}
.mark-done-btn:hover{border-color:#50fa7b;color:#50fa7b}
.ex-item.done .mark-done-btn{border-color:#50fa7b40;color:#50fa7b;background:#50fa7b12}
.ex-item.done .mark-done-btn:hover{border-color:#ff555580;color:#ff5555;background:#ff555512}
.ex-diff{font-size:10px;margin-top:3px;font-family:'Syne',system-ui}
.diff-easy{color:#50fa7b}.diff-med{color:#ffb86c}.diff-hard{color:#ff5555}
.ex-desc{font-size:11px;color:#6272a4;margin-top:4px;line-height:1.5;font-family:'Syne',system-ui}
.level-group{margin-bottom:10px}
.level-header{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;flex-wrap:wrap;padding:4px 4px 8px;margin:2px 0 6px;border-bottom:1px solid #383a4a}
.level-name{font-size:11px;color:#f8f8f2;font-family:'Syne',system-ui;font-weight:600;letter-spacing:.8px;text-transform:uppercase}
.level-note{font-size:10.5px;color:#6272a4;font-family:'Syne',system-ui;line-height:1.35;flex:1 1 170px;text-align:right}

/* ── Exercise detail / tests panel ── */
#ex-detail{
  display:none;flex-direction:column;
  border-top:1px solid #44475a;flex-shrink:0;max-height:45%;overflow:hidden;
}
#ex-detail.open{display:flex}
#ex-detail-hdr{padding:8px 12px;background:#21222c;border-bottom:1px solid #44475a;display:flex;align-items:center;gap:8px;flex-shrink:0}
#ex-detail-hdr span{font-size:12px;color:#ffb86c;font-family:'Syne',system-ui;font-weight:500;flex:1}
#test-btn{padding:4px 12px;background:#50fa7b;color:#282a36;border:none;border-radius:5px;font-size:11px;cursor:pointer;font-family:'Syne',system-ui;font-weight:600;transition:background .12s}
#test-btn:hover{background:#7afcab}
#ex-detail-body{overflow-y:auto;padding:10px 12px;flex:1}
.ex-full-desc{font-size:12px;color:#f8f8f2;line-height:1.7;margin-bottom:10px;font-family:'Syne',system-ui}
.ex-full-desc code{color:#f1fa8c;background:#44475a40;padding:1px 5px;border-radius:3px}
.test-result{display:flex;align-items:flex-start;gap:8px;padding:6px 8px;border-radius:6px;margin-bottom:5px;font-size:11.5px;font-family:'Syne',system-ui;line-height:1.5}
.test-result.pass{background:#50fa7b18;border:1px solid #50fa7b40;color:#50fa7b}
.test-result.fail{background:#ff555518;border:1px solid #ff555540;color:#ff5555}
.test-result.pending{background:#44475a30;border:1px solid #44475a;color:#6272a4}
.test-icon{flex-shrink:0;font-size:13px}
.hint-btn{margin-top:8px;padding:4px 10px;background:transparent;border:1px solid #ffb86c40;border-radius:5px;color:#ffb86c;font-size:11px;cursor:pointer;font-family:'Syne',system-ui;transition:all .12s}
.hint-btn:hover{background:#ffb86c20}
.hint-box{margin-top:8px;padding:8px 10px;background:#ffb86c10;border:1px solid #ffb86c30;border-radius:6px;font-size:11.5px;color:#ffb86c;font-family:'Syne',system-ui;line-height:1.6;display:none}
.hint-box.show{display:block}
.concept-box{margin-top:8px;padding:8px 10px;background:#8be9fd10;border:1px solid #8be9fd30;border-radius:6px;font-size:11.5px;color:#8be9fd;font-family:'Syne',system-ui;line-height:1.6;display:none}
.concept-box.show{display:block}
.concept-box strong{display:block;margin-bottom:4px;color:#f8f8f2;font-size:11px;text-transform:uppercase;letter-spacing:.7px}
.concept-box code{color:#f1fa8c;background:#44475a40;padding:1px 5px;border-radius:3px}
.concept-copy p{margin-top:6px}
.concept-copy p:first-child{margin-top:0}
.tutorial-box{margin-top:8px;padding:8px 10px;background:#50fa7b10;border:1px solid #50fa7b30;border-radius:6px;font-size:11.5px;color:#50fa7b;font-family:'Syne',system-ui;line-height:1.6;display:none}
.tutorial-box.show{display:block}
.tutorial-box strong{display:block;margin-bottom:6px;color:#f8f8f2;font-size:11px;text-transform:uppercase;letter-spacing:.7px}
.tutorial-step{margin-top:8px;padding:8px 9px;border-radius:6px;background:#44475a20;border:1px solid #44475a50}
.tutorial-step:first-of-type{margin-top:0}
.tutorial-step-title{color:#50fa7b;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.tutorial-step-body{color:#f8f8f2;font-size:11.5px;line-height:1.6}
.tutorial-step-example{margin-top:6px;padding:6px 8px;background:#282a36;border:1px solid #44475a;border-radius:5px;overflow:auto}
.tutorial-step-example code{display:block;white-space:pre-wrap;color:#f1fa8c;background:transparent;padding:0;border-radius:0}
.review-box{margin-top:8px;padding:10px 10px 8px;background:#bd93f910;border:1px solid #bd93f940;border-radius:8px;font-size:11.5px;color:#bd93f9;font-family:'Syne',system-ui;line-height:1.6;display:none}
.review-box.show{display:block}
.review-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.review-topic{color:#f8f8f2;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px}
.review-score{color:#f1fa8c;font-size:11px}
.review-q{color:#f8f8f2;font-size:12px;line-height:1.6;margin-bottom:8px}
.review-choice{display:block;width:100%;text-align:left;padding:7px 9px;margin-top:6px;border-radius:6px;border:1px solid #44475a;background:#282a36;color:#f8f8f2;font-size:11.5px;cursor:pointer;font-family:'Syne',system-ui;transition:background .12s,border-color .12s}
.review-choice:hover{background:#343746;border-color:#bd93f940}
.review-choice.correct{background:#50fa7b18;border-color:#50fa7b80;color:#50fa7b}
.review-choice.wrong{background:#ff555518;border-color:#ff555580;color:#ff5555}
.review-feedback{margin-top:8px;padding:8px 9px;border-radius:6px;background:#44475a30;border:1px solid #44475a;color:#f8f8f2;display:none}
.review-feedback.show{display:block}
.review-actions{display:flex;gap:8px;align-items:center;margin-top:8px}
.review-actions button{padding:4px 10px;border-radius:5px;border:1px solid #bd93f940;background:#bd93f920;color:#f8f8f2;cursor:pointer;font-family:'Syne',system-ui;font-size:11px}
.review-actions button:hover{background:#bd93f930}
.path-lock{opacity:.52}
.path-lock .tick{visibility:hidden}
.path-lock .ex-title::before{content:'🔒 ';margin-right:2px}

/* ── Workspace ── */
#ws{display:flex;flex:1;overflow:hidden;min-height:0}
#left{display:flex;width:50%;min-width:80px;overflow:hidden;position:relative}
#left.layout-v{flex-direction:column}
#left.layout-h{flex-direction:row}
.ep{display:flex;flex-direction:column;overflow:hidden;flex:1;position:relative}
.ep.hide{display:none!important}
#left.layout-v .ep{min-height:50px;min-width:unset}
#left.layout-h .ep{min-width:60px;min-height:unset}
.ep-hdr{display:flex;align-items:center;gap:7px;padding:5px 10px;background:#21222c;border-bottom:1px solid #44475a;flex-shrink:0;cursor:grab;user-select:none;transition:background .12s}
.ep-hdr:hover{background:#2d2f3f}.ep-hdr:active{cursor:grabbing}
.drag-icon{display:flex;flex-direction:column;gap:2px;opacity:.35;transition:opacity .12s;flex-shrink:0}
.ep-hdr:hover .drag-icon{opacity:.75}
.drag-icon span{display:block;width:11px;height:2px;background:#6272a4;border-radius:1px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-js{background:#f1fa8c}.dot-html{background:#ff79c6}.dot-css{background:#8be9fd}
.ep-label{font-size:12px;color:#6272a4;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.ew{flex:1;overflow:hidden;min-height:0;min-width:0}
.psplit{background:#383a4a;flex-shrink:0;z-index:20;transition:background .12s}
.psplit:hover,.psplit.active{background:#bd93f9}
#left.layout-v .psplit{height:5px;cursor:ns-resize}
#left.layout-h .psplit{width:5px;cursor:ew-resize}
#vsplit{width:5px;background:#383a4a;flex-shrink:0;cursor:ew-resize;z-index:20;transition:background .12s}
#vsplit:hover,#vsplit.active{background:#bd93f9}
#csplit{height:5px;background:#383a4a;flex-shrink:0;cursor:ns-resize;z-index:20;transition:background .12s}
#csplit:hover,#csplit.active{background:#bd93f9}
.drop-line{position:absolute;z-index:200;pointer-events:none;background:#bd93f9;box-shadow:0 0 8px #bd93f9}
#left.layout-v .drop-line{left:0;right:0;height:3px}
#left.layout-h .drop-line{top:0;bottom:0;width:3px}
#drag-ghost{position:fixed;z-index:9999;pointer-events:none;background:#21222c;border:1px solid #bd93f9;border-radius:6px;padding:5px 12px;font-size:12px;color:#bd93f9;font-family:'JetBrains Mono',monospace;display:none;align-items:center;gap:8px;box-shadow:0 8px 24px #00000080;white-space:nowrap}

#right{display:flex;flex-direction:column;flex:1;min-width:80px;overflow:hidden}
#pvwrap{flex:1;position:relative;overflow:hidden;min-height:60px}
#pv{width:100%;height:100%;border:none;display:block;background:#fff}
#pvcover{display:none;position:absolute;inset:0;z-index:50;cursor:inherit}
#console{display:flex;flex-direction:column;height:180px;min-height:40px;overflow:hidden}
#cbr{display:flex;align-items:center;padding:6px 14px;background:#21222c;border-bottom:1px solid #44475a;flex-shrink:0;gap:8px}
.cb-lbl{font-size:11px;color:#6272a4;font-family:'Syne',system-ui;text-transform:uppercase;letter-spacing:.8px;flex:1}
#co{flex:1;overflow-y:auto;padding:8px 14px;font-size:13.5px;line-height:1.8;background:#282a36}
.lg{color:#f8f8f2}.lw{color:#ffb86c}.le{color:#ff5555}.li{color:#8be9fd}
.ll{display:flex;gap:10px;padding:1px 0}.lp{color:#6272a4;flex-shrink:0;font-size:12px}
#sd{width:8px;height:8px;border-radius:50%;background:#6272a4;flex-shrink:0;transition:background .25s}
#sd.run{background:#ffb86c}#sd.ok{background:#50fa7b}#sd.err{background:#ff5555}


/* ── CodeMirror Dracula ── */
.ew .CodeMirror{height:100%!important;font-family:'JetBrains Mono',monospace!important;font-size:14px!important;line-height:1.75!important;background:#282a36!important;color:#f8f8f2!important}
.ew .CodeMirror-gutters{background:#21222c!important;border-right:1px solid #44475a!important;min-width:46px!important}
.ew .CodeMirror-linenumber{color:#6272a4!important;font-size:12px!important;padding:0 8px 0 4px!important}
.ew .CodeMirror-cursor{border-left:2px solid #f8f8f2!important}
.panel-close{margin-left:auto;background:none;border:none;color:#6272a4;font-size:16px;line-height:1;cursor:pointer;padding:0 4px;border-radius:3px;transition:color .15s,background .15s;flex-shrink:0}
.panel-close:hover{color:#ff5555;background:#ffffff12}
.ew .CodeMirror-selected{background:#44475a80!important}
.ew .CodeMirror-activeline-background{background:#ffffff05!important}
.ew .CodeMirror-matchingbracket{color:#ff79c6!important;font-weight:bold!important}
.ew .cm-keyword{color:#ff79c6!important}.ew .cm-def{color:#50fa7b!important}
.ew .cm-variable{color:#f8f8f2!important}.ew .cm-variable-2{color:#8be9fd!important}
.ew .cm-variable-3{color:#ffb86c!important}.ew .cm-property{color:#8be9fd!important}
.ew .cm-operator{color:#ff79c6!important}.ew .cm-number{color:#bd93f9!important}
.ew .cm-string{color:#f1fa8c!important}.ew .cm-string-2{color:#f1fa8c!important}

.ew .cm-comment{color:#6272a4!important;font-style:italic!important}
.ew .cm-atom{color:#bd93f9!important}.ew .cm-builtin{color:#50fa7b!important}
.ew .cm-tag{color:#ff79c6!important}.ew .cm-attribute{color:#50fa7b!important}
.ew .cm-qualifier{color:#50fa7b!important}.ew .cm-bracket{color:#f8f8f2!important}
.ew .cm-error{background:#ff555430!important;color:#ff5555!important}
.CodeMirror-hints{background:#21222c!important;border:1px solid #6272a4!important;border-radius:8px!important;font-family:'JetBrains Mono',monospace!important;font-size:13px!important;color:#f8f8f2!important;z-index:9999!important;padding:4px!important}
.CodeMirror-hint{color:#f8f8f2!important;padding:5px 14px!important;border-radius:4px!important}
.CodeMirror-hint-active{background:#44475a!important;color:#bd93f9!important}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#44475a;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#6272a4}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/javascript-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/html-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/css-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closetag.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/comment/comment.min.js"></script>
</head>
<body>

<div id="bar">
  <span id="logo">⬡ playground</span>
  <button class="ibtn" id="ex-toggle-btn">📚 exercises</button>

  <div class="bar-group">
    <label>panels:</label>
    <button class="ibtn vis" id="tog-js">JS</button>
    <button class="ibtn vis" id="tog-html">HTML</button>
    <button class="ibtn vis" id="tog-css">CSS</button>
  </div>
  <div class="bar-group">
    <label>layout:</label>
    <button class="ibtn on" id="lay-v">⊞ vertical</button>
    <button class="ibtn" id="lay-h">⊟ horizontal</button>
  </div>
  <div class="bar-group">
    <label>mode:</label>
    <button class="ibtn on" id="catalog-btn">catalog</button>
    <button class="ibtn" id="path-btn">path</button>
    <button class="ibtn" id="review-btn">review</button>
  </div>
  <div class="sp"></div>
  <button class="ibtn on" id="ar-btn">auto-run</button>
  <button class="ibtn" id="clr-btn">clear</button>
  <button class="rbtn" id="run-btn">▶ run</button>
</div>
<div id="ar-bar"><div id="ar-prog"></div></div>

<div id="shell">
  <!-- Exercises sidebar -->
  <div id="ex-sidebar" class="closed">
    <div id="ex-hdr">
      <h2>JavaScript Exercises</h2>
      <p>Progress from fundamentals to advanced patterns</p>
      <div id="progress-row">
        <span id="progress-summary">0/0 completed</span>
        <button id="reset-progress-btn" class="hint-btn" style="margin-top:0;padding:3px 8px">reset progress</button>
      </div>
      <div id="review-box" class="review-box"></div>
    </div>
    <div id="ex-cats"></div>
    <div id="ex-list"></div>
    <div id="ex-detail">
      <div id="ex-detail-hdr">
        <span id="ex-detail-title">Exercise</span>
        <button id="concept-toggle-btn" class="hint-btn" style="margin-top:0;padding:3px 9px;border-color:#8be9fd40;color:#8be9fd">concept</button>
        <button id="hint-toggle-btn" class="hint-btn" style="margin-top:0;padding:3px 9px">hint</button>
        <button id="test-btn">▶ run tests</button>
      </div>
      <div id="ex-detail-body">
        <div class="ex-full-desc" id="ex-full-desc"></div>
        <div id="tutorial-box" class="tutorial-box"></div>
        <div id="concept-box" class="concept-box"></div>
        <div id="hint-box" class="hint-box"></div>
        <div id="test-results"></div>
      </div>
    </div>
  </div>

  <div id="ex-split"></div>

  <!-- Main workspace -->
  <div id="ws">
    <div id="left" class="layout-v"></div>
    <div id="vsplit"></div>

function getExerciseFn(code, name){
  return new Function(code + '\nreturn ' + name + ';')();
}

async function getModuleExports(code){
  const blob=new Blob([code],{type:'text/javascript'});
  const url=URL.createObjectURL(blob);
  try{return await import(url);}finally{URL.revokeObjectURL(url);}
}

const LEVEL_BY_DIFF={easy:'Fundamentals',medium:'Intermediate',hard:'Advanced'};
const LEVEL_ORDER=['Fundamentals','Intermediate','Advanced'];
const LEVEL_META={
  Fundamentals:{note:'Core syntax, values, and control flow'},
  Intermediate:{note:'Reusable patterns and data shaping'},
  Advanced:{note:'Recursion, caching, and stateful systems'}
};

function getLevel(diff){
  return LEVEL_BY_DIFF[diff] || 'Intermediate';
}

const PROGRESS_KEY='js-playground.completed-exercises';
function loadCompletedIds(){
  try{
    const raw=localStorage.getItem(PROGRESS_KEY);
    if(!raw)return [];
    const parsed=JSON.parse(raw);
    return Array.isArray(parsed)?parsed.filter(id=>Number.isInteger(id)&&EXERCISES.some(ex=>ex.id===id)):[];
  }catch(e){return [];}
}
function saveCompletedIds(){
  try{localStorage.setItem(PROGRESS_KEY,JSON.stringify([...done]));}catch(e){}
}
function updateProgressSummary(){
  const el=document.getElementById('progress-summary');
  if(el)el.textContent=`${done.size}/${EXERCISES.length} completed`;
}
function markCompleted(id){
  if(!done.has(id)){
    done.add(id);
    saveCompletedIds();
    updateProgressSummary();
  }
}
function toggleCompleted(id){
  if(done.has(id)){done.delete(id);}else{done.add(id);}
  saveCompletedIds();
  updateProgressSummary();
  renderExList();
}
function clearCompleted(){
  done.clear();
  saveCompletedIds();
  updateProgressSummary();
  renderExList();
}

/* ── Categories ── */
const CURRICULUM_ORDER=['Basics','Functions','Modern Syntax','Arrays','Strings','Objects','Loops','Challenges','DOM','Promises','Async','Classes','Modules','Destructuring & Spread','Array Methods','String Methods','Browser APIs','HTTP & Auth','Error Handling','Data Structures','Dates','This','Mini Projects','Capstone','Full Stack Tutorial'];
const ALL_CATEGORIES=[...new Set(EXERCISES.map(e=>e.cat))];
const CATS=['All',...CURRICULUM_ORDER.filter(cat=>ALL_CATEGORIES.includes(cat)),...ALL_CATEGORIES.filter(cat=>!CURRICULUM_ORDER.includes(cat))];
const done=new Set(loadCompletedIds());
let activeCat='All';
let activeEx=null;
let learningMode='catalog';
let reviewMode=false;
let reviewIndex=0;
let reviewScore=0;
let reviewAnswered=false;
let reviewSelected=-1;

const REVIEW_BANK=[
  {topic:'Modern Syntax',question:'Which operator falls back only when a value is null or undefined?',choices:['||','??','&&','?:'],answer:1,explanation:'Nullish coalescing uses ??, so empty strings and 0 still count as valid values.'},
  {topic:'Modern Syntax',question:'What does optional chaining prevent when a nested property is missing?',choices:['A syntax error','A crash from accessing undefined','A network timeout','A duplicate object'],answer:1,explanation:'Optional chaining uses ?. to stop property access safely when a parent object is nullish.'},
  {topic:'Modern Syntax',question:'What is the main use of a ternary expression?',choices:['Creating arrays','Two-way conditional expressions','Looping over objects','Parsing JSON'],answer:1,explanation:'Ternaries are compact if/else expressions that return one of two values.'},
  {topic:'Modern Syntax',question:'When does the right side of && run?',choices:['Always','Only when the left side is truthy','Only when the left side is falsy','Only inside a function'],answer:1,explanation:'Short circuiting with && skips the right side when the left side is falsy.'},
  {topic:'This',question:'Inside an object method, what does this usually refer to?',choices:['The global object','The object that called the method','The nearest arrow function','The last variable declared'],answer:1,explanation:'this depends on the call site, and object methods usually receive the object they were called on.'},
  {topic:'This',question:'Which pair lets you choose the this value explicitly?',choices:['map and filter','call and apply','?? and ?.','setTimeout and Promise'],answer:1,explanation:'call and apply invoke a function with a specific this value.'},
  {topic:'Browser APIs',question:'What should you do before storing an object in localStorage?',choices:['Call JSON.stringify','Call JSON.parse','Use optional chaining','Convert it to a Map'],answer:0,explanation:'localStorage only stores strings, so objects need to be serialized first.'},
  {topic:'DOM',question:'What is event delegation?',choices:['One listener per child','A parent listener handling child events','Using fetch for events','Cloning elements'],answer:1,explanation:'Event delegation uses a single parent listener to handle events from many descendants.'}
];

function getOrderedCategories(){
  return CURRICULUM_ORDER.filter(cat=>ALL_CATEGORIES.includes(cat)).concat(ALL_CATEGORIES.filter(cat=>!CURRICULUM_ORDER.includes(cat)));
}
function getCurriculumPath(){
  const diffRank={easy:0,medium:1,hard:2};
  return getOrderedCategories().flatMap(cat=>EXERCISES.filter(ex=>ex.cat===cat).sort((a,b)=>diffRank[a.diff]-diffRank[b.diff]||a.id-b.id));
}

function updateModeUI(){
  const catalogBtn=document.getElementById('catalog-btn');
  const pathBtn=document.getElementById('path-btn');
  const reviewBtn=document.getElementById('review-btn');
  if(catalogBtn)catalogBtn.classList.toggle('on',learningMode==='catalog');
  if(pathBtn)pathBtn.classList.toggle('on',learningMode==='path');
  if(reviewBtn)reviewBtn.classList.toggle('on',reviewMode);
  const cats=document.getElementById('ex-cats');
  if(cats)cats.style.display=learningMode==='catalog'?'':'none';
  const subtitle=document.querySelector('#ex-hdr p');
  if(subtitle)subtitle.textContent=learningMode==='path'?'Strict beginner-to-advanced learning path':'Progress from fundamentals to advanced patterns';
}

function setLearningMode(mode){
  learningMode=mode;
  updateModeUI();
  renderExList();
}

function toggleReviewMode(){
  reviewMode=!reviewMode;
  reviewAnswered=false;
  reviewSelected=-1;
  if(reviewMode&&!sidebarOpen){
    sidebarOpen=true;
    sidebar.classList.remove('closed');
    document.getElementById('ex-toggle-btn').classList.add('ex-on');
    setTimeout(()=>Object.values(eds).forEach(cm=>cm.refresh()),220);
  }
  updateModeUI();
  renderReviewPanel();
}

let sidebarOpen=false;
const sidebar=document.getElementById('ex-sidebar');
const exSplit=document.getElementById('ex-split');
let sidebarWidth=300;

  exSplit.style.display=sidebarOpen?'':'none';
  if(sidebarOpen){
    sidebar.style.width=sidebarWidth+'px';

document.getElementById('ex-toggle-btn').addEventListener('click',()=>{

  document.getElementById('ex-toggle-btn').classList.toggle('ex-on',sidebarOpen);

/* ── Render category buttons ── */
const catEl=document.getElementById('ex-cats');
CATS.forEach(c=>{
  const b=document.createElement('button');
  b.className='cat-btn'+(c==='All'?' on':'');
  b.textContent=c;
  b.addEventListener('click',()=>{
    activeCat=c;
    catEl.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    renderExList();
  });
  catEl.appendChild(b);
});

/* ── Render exercise list ── */
function renderExList(){
  const list=document.getElementById('ex-list');
  list.innerHTML='';
  if(learningMode==='path'){
    renderPathList(list);
    return;
  }
  const filtered=activeCat==='All'?EXERCISES:EXERCISES.filter(e=>e.cat===activeCat);
  const grouped=LEVEL_ORDER.map(level=>({level,items:[]}));
  filtered.forEach(ex=>{
    const group=grouped.find(item=>item.level===getLevel(ex.diff));
    if(group)group.items.push(ex);
  });
  grouped.filter(group=>group.items.length).forEach(group=>{
    const wrap=document.createElement('div');
    wrap.className='level-group';
    const hdr=document.createElement('div');
    hdr.className='level-header';
    hdr.innerHTML=`<span class="level-name">${group.level}</span><span class="level-note">${group.items.length} exercise${group.items.length===1?'':'s'} · ${LEVEL_META[group.level].note}</span>`;
    wrap.appendChild(hdr);
    group.items.forEach(ex=>{
      const d=document.createElement('div');
      d.className='ex-item'+(done.has(ex.id)?' done':'')+(activeEx&&activeEx.id===ex.id?' active':'');
      d.innerHTML=`<div class="ex-title"><span class="tick">✓</span>${ex.title}<button class="mark-done-btn" title="${done.has(ex.id)?'Mark incomplete':'Mark complete'}">${done.has(ex.id)?'✓ done':'mark done'}</button></div>
        <div class="ex-diff diff-${ex.diff==='easy'?'easy':ex.diff==='medium'?'med':'hard'}">${group.level}</div>
        <div class="ex-desc">${ex.desc}</div>`;
      d.querySelector('.mark-done-btn').addEventListener('click',e=>{e.stopPropagation();toggleCompleted(ex.id);});
      d.addEventListener('click',()=>loadExercise(ex));
      wrap.appendChild(d);
    });
    list.appendChild(wrap);
  });
}

/* ── Load exercise into editor ── */
function loadExercise(ex){
  activeEx=ex;
  // Set starter code in JS editor
  if(eds.js){eds.js.setValue(ex.starter);codes.js=ex.starter;}
  // Show detail panel
  const detail=document.getElementById('ex-detail');
  detail.classList.add('open');
  document.getElementById('ex-detail-title').textContent=ex.title;
  document.getElementById('ex-full-desc').innerHTML=ex.fullDesc;
  renderTutorialSteps(ex.steps);
  document.getElementById('concept-box').innerHTML=`<strong>Concept:</strong><br><div class="concept-copy">${getConceptText(ex)}</div>`;
  document.getElementById('concept-box').classList.remove('show');
  document.getElementById('hint-box').textContent=ex.hint;
  document.getElementById('hint-box').classList.remove('show');
  // Render pending tests
  renderTests(ex.tests.map(t=>({...t,state:'pending'})));
  renderExList();
  renderReviewPanel();
  // Focus JS editor
  if(eds.js)setTimeout(()=>eds.js.focus(),100);
}

/* ── Render test results ── */
function renderTests(results){
  const el=document.getElementById('test-results');
  el.innerHTML='';
  results.forEach(r=>{
    const d=document.createElement('div');
    d.className='test-result '+r.state;
    const icon=r.state==='pass'?'✓':r.state==='fail'?'✕':'○';
    d.innerHTML=`<span class="test-icon">${icon}</span><span>${r.desc}</span>`;
    el.appendChild(d);
  });
}

function renderTutorialSteps(steps){
  const el=document.getElementById('tutorial-box');
  if(!el)return;
  el.innerHTML='';
  if(!Array.isArray(steps)||!steps.length){
    el.classList.remove('show');
    return;
  }
  const label=document.createElement('strong');
  label.textContent='Guided Tutorial';
  el.appendChild(label);
  steps.forEach((step,index)=>{
    const card=document.createElement('div');
    card.className='tutorial-step';
    const title=document.createElement('div');
    title.className='tutorial-step-title';
    title.textContent=`Step ${index+1}: ${step.title}`;
    const body=document.createElement('div');
    body.className='tutorial-step-body';
    body.textContent=step.body;
    card.appendChild(title);
    card.appendChild(body);
    if(step.example){
      const example=document.createElement('pre');
      example.className='tutorial-step-example';
      const code=document.createElement('code');
      code.textContent=step.example;
      example.appendChild(code);
      card.appendChild(example);
    }
    el.appendChild(card);
  });
  el.classList.add('show');
}

function renderPathList(list){
  const ordered=getCurriculumPath();
  const unlockIndex=ordered.findIndex(ex=>!done.has(ex.id));
  const wrap=document.createElement('div');
  wrap.className='level-group';
  const hdr=document.createElement('div');
  hdr.className='level-header';
  hdr.innerHTML='<span class="level-name">Learning Path</span><span class="level-note">Strict beginner-to-advanced order with one unlocked step at a time</span>';
  wrap.appendChild(hdr);
  ordered.forEach((ex,index)=>{
    const locked=unlockIndex!==-1&&index>unlockIndex;
    const d=document.createElement('div');
    d.className='ex-item path-step'+(done.has(ex.id)?' done':'')+(activeEx&&activeEx.id===ex.id?' active':'')+(locked?' path-lock':'');
    d.innerHTML=`<div class="ex-title"><span class="tick">${locked?'🔒':done.has(ex.id)?'✓':'→'}</span>${index+1}. ${ex.title}${!locked?`<button class="mark-done-btn" title="${done.has(ex.id)?'Mark incomplete':'Mark complete'}">${done.has(ex.id)?'✓ done':'mark done'}</button>`:''}</div>
      <div class="ex-diff diff-${ex.diff==='easy'?'easy':ex.diff==='medium'?'med':'hard'}">${ex.cat}</div>
      <div class="ex-desc">${ex.desc}</div>`;
    if(!locked){
      const btn=d.querySelector('.mark-done-btn');
      if(btn)btn.addEventListener('click',e=>{e.stopPropagation();toggleCompleted(ex.id);});
      d.addEventListener('click',()=>loadExercise(ex));
    }
    wrap.appendChild(d);
  });
  list.appendChild(wrap);
}

function renderReviewPanel(){
  const el=document.getElementById('review-box');
  if(!el)return;
  el.innerHTML='';
  if(!reviewMode||!REVIEW_BANK.length){
    el.classList.remove('show');
    return;
  }
  const item=REVIEW_BANK[reviewIndex%REVIEW_BANK.length];
  el.classList.add('show');

  const head=document.createElement('div');
  head.className='review-head';
  const topic=document.createElement('div');
  topic.className='review-topic';
  topic.textContent=item.topic;
  const score=document.createElement('div');
  score.className='review-score';
  score.textContent=`Score ${reviewScore} · ${reviewIndex+1}/${REVIEW_BANK.length}`;
  head.appendChild(topic);
  head.appendChild(score);
  el.appendChild(head);

  const question=document.createElement('div');
  question.className='review-q';
  question.textContent=item.question;
  el.appendChild(question);

  item.choices.forEach((choice,choiceIndex)=>{
    const button=document.createElement('button');
    button.className='review-choice';
    button.type='button';
    button.textContent=choice;
    if(reviewAnswered){
      if(choiceIndex===item.answer)button.classList.add('correct');
      else if(choiceIndex===reviewSelected)button.classList.add('wrong');
      button.disabled=true;
    } else {
      button.addEventListener('click',()=>{
        reviewAnswered=true;
        reviewSelected=choiceIndex;
        if(choiceIndex===item.answer)reviewScore+=1;
        renderReviewPanel();
      });
    }
    el.appendChild(button);
  });

  const feedback=document.createElement('div');
  feedback.className='review-feedback'+(reviewAnswered?' show':'');
  if(reviewAnswered){
    const isCorrect=reviewSelected===item.answer;
    feedback.textContent=`${isCorrect?'Correct.':'Not quite.'} ${item.explanation}`;
  } else {
    feedback.textContent='Choose an answer to reveal the concept check.';
  }
  el.appendChild(feedback);

  const actions=document.createElement('div');
  actions.className='review-actions';
  const nextBtn=document.createElement('button');
  nextBtn.type='button';
  nextBtn.textContent=reviewAnswered?'next question':'skip';
  nextBtn.addEventListener('click',()=>{
    reviewIndex=(reviewIndex+1)%REVIEW_BANK.length;
    reviewAnswered=false;
    reviewSelected=-1;
    renderReviewPanel();
  });
  const resetBtn=document.createElement('button');
  resetBtn.type='button';
  resetBtn.textContent='reset quiz';
  resetBtn.addEventListener('click',()=>{
    reviewIndex=0;
    reviewScore=0;
    reviewAnswered=false;
    reviewSelected=-1;
    renderReviewPanel();
  });
  actions.appendChild(nextBtn);
  actions.appendChild(resetBtn);
  el.appendChild(actions);
}

function buildConcept(summary, how='', example=''){
  const parts=[`<p>${summary}</p>`];
  if(how)parts.push(`<p>${how}</p>`);
  if(example)parts.push(`<p><strong>Example:</strong> <code>${example}</code></p>`);
  return parts.join('');
}

function getConceptText(ex){
  if(ex.concept)return ex.concept;
  const titleRule=CONCEPT_BY_TITLE.find(([match])=>match.test(ex.title));
  if(titleRule)return titleRule[1]();
  return CONCEPT_BY_CAT[ex.cat] || buildConcept(`This exercise reinforces the core ideas in ${ex.cat}.`, 'Read the prompt carefully, identify the main tool you need, and work in small steps until the result matches the prompt.');
}

document.getElementById('test-btn').addEventListener('click',async()=>{
  if(!activeEx)return;
  const testBtn=document.getElementById('test-btn');
  testBtn.disabled=true;
  const code=eds.js?eds.js.getValue():codes.js;
  renderTests(activeEx.tests.map(t=>({...t,state:'pending'})));
  const results=[];
  try{
    for(const t of activeEx.tests){
      let passed=false;
      try{passed=await Promise.resolve(t.fn(code));}catch(e){passed=false;}
      results.push({...t,state:passed?'pass':'fail'});
    }
    renderTests(results);
    const allPass=results.every(r=>r.state==='pass');
    if(allPass){
      markCompleted(activeEx.id);
      renderExList();
      addLog('li',`✓ All tests passed for "${activeEx.title}"! 🎉`);
    } else {
      const n=results.filter(r=>r.state==='fail').length;
      addLog('lw',`${n} test${n>1?'s':''} failing for "${activeEx.title}"`);
    }
  } finally {
    testBtn.disabled=false;
  }
});

const EC={'m':'margin: |;','mt':'margin-top: |;','mr':'margin-right: |;','mb':'margin-bottom: |;','ml':'margin-left: |;','p':'padding: |;','pt':'padding-top: |;','pr':'padding-right: |;','pb':'padding-bottom: |;','pl':'padding-left: |;','w':'width: |;','h':'height: |;','mw':'max-width: |;','wf':'width: 100%;','hf':'height: 100%;','bg':'background: |;','bgc':'background-color: |;','c':'color: |;','fs':'font-size: |;','fw':'font-weight: |;','ff':'font-family: |;','lh':'line-height: |;','df':'display: flex;','dg':'display: grid;','dn':'display: none;','db':'display: block;','dib':'display: inline-block;','jcc':'justify-content: center;','jcsb':'justify-content: space-between;','jcsa':'justify-content: space-around;','aic':'align-items: center;','aifs':'align-items: flex-start;','aife':'align-items: flex-end;','fdc':'flex-direction: column;','f1':'flex: 1;','fww':'flex-wrap: wrap;','posa':'position: absolute;','posr':'position: relative;','posf':'position: fixed;','poss':'position: sticky;','t':'top: |;','r':'right: |;','b':'bottom: |;','l':'left: |;','br':'border-radius: |;','brd':'border: 1px solid |;','bn':'border: none;','tac':'text-align: center;','tar':'text-align: right;','tdn':'text-decoration: none;','ttu':'text-transform: uppercase;','ovh':'overflow: hidden;','ova':'overflow: auto;','curp':'cursor: pointer;','op':'opacity: |;','z':'z-index: |;','tra':'transition: all 0.3s ease;','bs':'box-shadow: |;','gap':'gap: |;','gtc':'grid-template-columns: |;',};

function doEmmet(cm,lang){const cur=cm.getCursor();const before=cm.getLine(cur.line).slice(0,cur.ch);const m=before.match(/[\w!]+$/);if(!m)return false;const tpl=(lang==='css'?EC:EH)[m[0]];if(!tpl)return false;const from={line:cur.line,ch:cur.ch-m[0].length};const ci=tpl.indexOf('|');const expanded=tpl.replace('|','');const lines=expanded.split('\n');let tl=from.line,tc=from.ch,left=ci>=0?ci:expanded.length;for(let i=0;i<lines.length;i++){if(left<=lines[i].length){tl=from.line+i;tc=(i===0?from.ch:0)+left;break;}left-=lines[i].length+1;}cm.replaceRange(expanded,from,cur);cm.setCursor({line:tl,ch:tc});return true;}

/* ── Panel state ── */
const PANEL_META={js:{label:'script.js',dotClass:'dot-js',mode:{name:'javascript',globalVars:true}},html:{label:'index.html',dotClass:'dot-html',mode:'htmlmixed'},css:{label:'style.css',dotClass:'dot-css',mode:'css'}};
let panelOrder=['js','html','css'];
const vis={js:true,html:true,css:true};
const codes={js:CODE.js,html:CODE.html,css:CODE.css};
const eds={};
let layout='v';
const leftEl=document.getElementById('left');
const pvcover=document.getElementById('pvcover');
const ghost=document.getElementById('drag-ghost');

function makeEd(lang){
  const cm=CodeMirror(document.getElementById('ew-'+lang),{value:codes[lang],mode:PANEL_META[lang].mode,lineNumbers:true,autoCloseBrackets:true,matchBrackets:true,autoCloseTags:true,lineWrapping:false,extraKeys:{'Ctrl-Space':'autocomplete','Tab':cm=>{if(!doEmmet(cm,lang))cm.execCommand('indentMore');},'Insert':false,'Ctrl-/':cm=>cm.execCommand('toggleComment')}});
  cm.on('change',(_,ch)=>{codes[lang]=cm.getValue();if(ch.origin!=='setValue')scheduleRun();});
  cm.on('inputRead',()=>{const hf=lang==='js'?CodeMirror.hint.javascript:lang==='css'?CodeMirror.hint.css:CodeMirror.hint.html;cm.showHint({hint:hf,completeSingle:false});});
  return cm;
}

function renderPanels(){
  Array.from(leftEl.querySelectorAll('.ep,.psplit')).forEach(el=>el.remove());
  panelOrder.forEach((lang,i)=>{
    const ep=document.createElement('div');
    ep.className='ep'+(vis[lang]?'':' hide');ep.id='ep-'+lang;ep.dataset.lang=lang;
    const meta=PANEL_META[lang];
    ep.innerHTML=`<div class="ep-hdr" id="hdr-${lang}"><div class="drag-icon"><span></span><span></span><span></span></div><div class="dot ${meta.dotClass}"></div><span class="ep-label">${meta.label}</span><button class="panel-close" data-lang="${lang}" title="Close panel">×</button></div><div class="ew" id="ew-${lang}"></div>`;
    leftEl.appendChild(ep);
    if(i<panelOrder.length-1){const s=document.createElement('div');s.className='psplit';s.dataset.idx=i;leftEl.appendChild(s);}
  });
  panelOrder.forEach(lang=>{
    if(!eds[lang]){eds[lang]=makeEd(lang);}
    else{document.getElementById('ew-'+lang).appendChild(eds[lang].getWrapperElement());eds[lang].refresh();}
    document.getElementById('hdr-'+lang).addEventListener('mousedown',onHdrDown);
    document.getElementById('hdr-'+lang).querySelector('.panel-close').addEventListener('click',e=>{e.stopPropagation();const l=e.currentTarget.dataset.lang;vis[l]=false;document.getElementById('tog-'+l).classList.remove('vis');const ep=document.getElementById('ep-'+l);if(ep){ep.classList.add('hide');ep.style.flex='1';ep.style.height='';ep.style.width='';}updateSplitters();setTimeout(()=>Object.values(eds).forEach(cm=>cm.refresh()),10);});
  });
  leftEl.querySelectorAll('.psplit').forEach(s=>{
    s.addEventListener('mousedown',e=>{
      e.preventDefault();e.stopPropagation();
      const allItems=Array.from(leftEl.querySelectorAll('.ep:not(.hide),.psplit'));
      const idx=allItems.indexOf(s);const panA=allItems[idx-1];const panB=allItems[idx+1];
      if(!panA||!panB)return;
      if(layout==='v')startDrag('ph',e,{panA,panB,startA:panA.getBoundingClientRect().height,startB:panB.getBoundingClientRect().height});
      else startDrag('pw',e,{panA,panB,startA:panA.getBoundingClientRect().width,startB:panB.getBoundingClientRect().width});
      s.classList.add('active');
    });
  });
  updateSplitters();
  setTimeout(()=>Object.values(eds).forEach(cm=>cm.refresh()),10);
}

function updateSplitters(){
  leftEl.querySelectorAll('.psplit').forEach(s=>{
    const all=Array.from(leftEl.querySelectorAll('.ep,.psplit'));const idx=all.indexOf(s);
    const aVis=all[idx-1]&&!all[idx-1].classList.contains('hide');
    const bVis=all[idx+1]&&!all[idx+1].classList.contains('hide');
    s.style.display=(aVis&&bVis)?'':'none';
  });
}

document.getElementById('lay-v').addEventListener('click',()=>setLayout('v'));
document.getElementById('lay-h').addEventListener('click',()=>setLayout('h'));
function setLayout(l){
  layout=l;leftEl.classList.toggle('layout-v',l==='v');leftEl.classList.toggle('layout-h',l==='h');
  document.getElementById('lay-v').classList.toggle('on',l==='v');
  document.getElementById('lay-h').classList.toggle('on',l==='h');
  leftEl.querySelectorAll('.ep').forEach(ep=>{ep.style.flex='1';ep.style.height='';ep.style.width='';});
  setTimeout(()=>Object.values(eds).forEach(cm=>cm.refresh()),10);
}

['js','html','css'].forEach(l=>{
  document.getElementById('tog-'+l).addEventListener('click',()=>{
    vis[l]=!vis[l];document.getElementById('tog-'+l).classList.toggle('vis',vis[l]);
    const ep=document.getElementById('ep-'+l);
    if(ep){ep.classList.toggle('hide',!vis[l]);ep.style.flex='1';ep.style.height='';ep.style.width='';}
    updateSplitters();setTimeout(()=>Object.values(eds).forEach(cm=>cm.refresh()),10);
  });
});

/* ── Drag state ── */
let drag=null,reorder=null;
function startDrag(type,e,extra){
  e.preventDefault();e.stopPropagation();
  drag={type,startX:e.clientX,startY:e.clientY,...extra};
  pvcover.style.display='block';document.body.style.userSelect='none';
  document.body.style.cursor=(type==='v'||type==='pw'||type==='ex')?'ew-resize':'ns-resize';
}
document.getElementById('vsplit').addEventListener('mousedown',e=>{startDrag('v',e,{startW:leftEl.getBoundingClientRect().width});document.getElementById('vsplit').classList.add('active');});
document.getElementById('csplit').addEventListener('mousedown',e=>{startDrag('c',e,{startH:document.getElementById('console').getBoundingClientRect().height});document.getElementById('csplit').classList.add('active');});

function onHdrDown(e){
  if(e.target.tagName==='BUTTON')return;
  const lang=e.currentTarget.id.replace('hdr-','');
  reorder={lang,startX:e.clientX,startY:e.clientY,moved:false};
  ghost.innerHTML='';
  const d=document.createElement('div');d.className='dot '+PANEL_META[lang].dotClass;d.style.cssText='width:8px;height:8px;border-radius:50%;flex-shrink:0';
  ghost.appendChild(d);ghost.appendChild(document.createTextNode(' '+PANEL_META[lang].label));
  ghost.style.cssText=`display:flex;left:${e.clientX+14}px;top:${e.clientY-10}px`;
  pvcover.style.display='block';document.body.style.userSelect='none';e.preventDefault();
}

function getDropIndex(mx,my){
  const panels=panelOrder.map(l=>document.getElementById('ep-'+l)).filter(Boolean);
  if(layout==='v'){for(let i=0;i<panels.length;i++){const r=panels[i].getBoundingClientRect();if(my<r.top+r.height/2)return i;}
  }else{for(let i=0;i<panels.length;i++){const r=panels[i].getBoundingClientRect();if(mx<r.left+r.width/2)return i;}}
  return panels.length;
}

document.addEventListener('mousemove',e=>{
  if(reorder){
    const dx=Math.abs(e.clientX-reorder.startX),dy=Math.abs(e.clientY-reorder.startY);
    if(dx>5||dy>5)reorder.moved=true;
    if(!reorder.moved)return;
    ghost.style.left=(e.clientX+14)+'px';ghost.style.top=(e.clientY-10)+'px';
    leftEl.querySelectorAll('.drop-line').forEach(el=>el.remove());
    const dropIdx=getDropIndex(e.clientX,e.clientY);
    const panels=panelOrder.map(l=>document.getElementById('ep-'+l)).filter(Boolean);
    const lr=leftEl.getBoundingClientRect();
    const line=document.createElement('div');line.className='drop-line';
    if(layout==='v'){let top=dropIdx>=panels.length?(panels[panels.length-1]?.getBoundingClientRect().bottom-lr.top||0):(panels[dropIdx].getBoundingClientRect().top-lr.top);line.style.top=top+'px';}
    else{let lft=dropIdx>=panels.length?(panels[panels.length-1]?.getBoundingClientRect().right-lr.left||0):(panels[dropIdx].getBoundingClientRect().left-lr.left);line.style.left=lft+'px';}
    leftEl.appendChild(line);return;
  }
  if(!drag)return;
  if(drag.type==='ex'){
    const shell=document.getElementById('shell');
    const dx=e.clientX-drag.startX;
    const maxW=Math.max(220,shell.getBoundingClientRect().width-260);
    const newW=Math.max(220,Math.min(maxW,drag.startW+dx));
    sidebarWidth=newW;
    sidebar.style.width=newW+'px';
    sidebar.style.minWidth=newW+'px';
    Object.values(eds).forEach(cm=>cm.refresh());
    return;
  }
  if(drag.type==='v'){const ws=document.getElementById('ws');const dx=e.clientX-drag.startX;const newW=Math.max(120,Math.min(ws.getBoundingClientRect().width-120,drag.startW+dx));leftEl.style.width=newW+'px';leftEl.style.flex='none';Object.values(eds).forEach(cm=>cm.refresh());return;}
  if(drag.type==='ph'){const dy=e.clientY-drag.startY;const total=drag.startA+drag.startB;const newA=Math.max(50,Math.min(total-50,drag.startA+dy));drag.panA.style.flex='none';drag.panA.style.height=newA+'px';drag.panB.style.flex='1';drag.panB.style.height='';Object.values(eds).forEach(cm=>cm.refresh());return;}
  if(drag.type==='pw'){const dx=e.clientX-drag.startX;const total=drag.startA+drag.startB;const newA=Math.max(60,Math.min(total-60,drag.startA+dx));drag.panA.style.flex='none';drag.panA.style.width=newA+'px';drag.panB.style.flex='1';drag.panB.style.width='';Object.values(eds).forEach(cm=>cm.refresh());return;}
  if(drag.type==='c'){const con=document.getElementById('console');const dy=e.clientY-drag.startY;const newH=Math.max(40,Math.min(600,drag.startH-dy));con.style.height=newH+'px';con.style.flex='none';}
});

document.addEventListener('mouseup',e=>{
  if(reorder){
    ghost.style.display='none';leftEl.querySelectorAll('.drop-line').forEach(el=>el.remove());
    pvcover.style.display='none';document.body.style.userSelect='';
    if(reorder.moved){
      const dropIdx=getDropIndex(e.clientX,e.clientY);const fromIdx=panelOrder.indexOf(reorder.lang);
      if(fromIdx!==-1){
        const newOrder=panelOrder.filter(l=>l!==reorder.lang);
        const insertAt=dropIdx>fromIdx?dropIdx-1:dropIdx;
        newOrder.splice(Math.max(0,Math.min(newOrder.length,insertAt)),0,reorder.lang);
        panelOrder=newOrder;
        const sizes={};panelOrder.forEach(l=>{const ep=document.getElementById('ep-'+l);if(ep){const r=ep.getBoundingClientRect();sizes[l]={w:r.width,h:r.height};}});
        renderPanels();
        panelOrder.forEach(l=>{const ep=document.getElementById('ep-'+l);if(ep&&sizes[l]){if(layout==='v'){ep.style.flex='none';ep.style.height=sizes[l].h+'px';}else{ep.style.flex='none';ep.style.width=sizes[l].w+'px';}}});
      }
    }
    reorder=null;return;
  }
  if(!drag)return;
  leftEl.querySelectorAll('.psplit.active').forEach(s=>s.classList.remove('active'));
  document.getElementById('vsplit').classList.remove('active');
  document.getElementById('csplit').classList.remove('active');
  exSplit.classList.remove('active');
  drag=null;pvcover.style.display='none';document.body.style.userSelect='';document.body.style.cursor='';
});

/* ── Auto-run ── */
const prog=document.getElementById('ar-prog');const arBtn=document.getElementById('ar-btn');
let autoRun=true,arTimer=null;const DELAY=1200;
function scheduleRun(){if(!autoRun)return;clearTimeout(arTimer);prog.style.transition='none';prog.style.width='0%';requestAnimationFrame(()=>{prog.style.transition=`width ${DELAY}ms linear`;prog.style.width='100%';});arTimer=setTimeout(()=>{prog.style.transition='none';prog.style.width='0%';run();},DELAY);}
arBtn.addEventListener('click',()=>{autoRun=!autoRun;arBtn.classList.toggle('on',autoRun);if(!autoRun){clearTimeout(arTimer);prog.style.width='0%';}});

/* ── Run ── */
const co=document.getElementById('co');const sd=document.getElementById('sd');const pv=document.getElementById('pv');
function addLog(cls,txt){const d=document.createElement('div');d.className='ll';const p=document.createElement('span');p.className='lp';p.textContent=cls==='le'?'✕':cls==='lw'?'!':cls==='li'?'i':'›';const s=document.createElement('span');s.className=cls;s.textContent=txt;d.appendChild(p);d.appendChild(s);co.appendChild(d);co.scrollTop=co.scrollHeight;}
function clearCo(){co.innerHTML='';sd.className='';}
function run(){
  Object.keys(codes).forEach(l=>{if(eds[l])codes[l]=eds[l].getValue();});clearCo();sd.className='run';
  const ic=`<script>const _f=x=>{try{return typeof x==='object'?JSON.stringify(x,null,2):String(x)}catch{return String(x)}};const _l=(t,...a)=>window.parent.postMessage({type:'con',lv:t,tx:a.map(_f).join(' ')},'*');console.log=(...a)=>_l('lg',...a);console.warn=(...a)=>_l('lw',...a);console.error=(...a)=>_l('le',...a);console.info=(...a)=>_l('li',...a);window.onerror=(m,s,l)=>{_l('le',m+' (line '+l+')');return true;};<\/script>`;
  let base=codes.html;if(!base.includes('<html'))base=`<!DOCTYPE html><html><head><\/head><body>${base}<\/body></html>`;
  const moduleScript=/^\s*(?:import|export)\b/m.test(codes.js);
  const jsOpen=moduleScript?'<script type="module">':'<script>';
  const final=base.replace('<\/head>',`<style>${codes.css}</style><\/head>`).replace('<head>','<head>'+ic).replace('<\/body>',`${jsOpen}\n${codes.js}\n<\/script><\/body>`);
  pv.srcdoc=final;setTimeout(()=>{if(sd.className==='run')sd.className='ok';},700);
}
window.addEventListener('message',e=>{if(e.data?.type==='con'){addLog(e.data.lv,e.data.tx);if(e.data.lv==='le')sd.className='err';}});
document.getElementById('run-btn').addEventListener('click',run);
document.getElementById('clr-btn').addEventListener('click',()=>{Object.keys(codes).forEach(l=>{codes[l]='';if(eds[l])eds[l].setValue('');});});
document.getElementById('clrc-btn').addEventListener('click',clearCo);

/* ── Init ── */
renderPanels();run();
syncSidebarLayout();
</script>
</body>
