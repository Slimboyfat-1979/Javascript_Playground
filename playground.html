<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Playground</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#282a36}
body{font-family:'JetBrains Mono',monospace;display:flex;flex-direction:column}

#bar{display:flex;align-items:center;gap:8px;padding:9px 14px;background:#21222c;border-bottom:1px solid #44475a;flex-shrink:0}
#logo{font-family:'Syne',system-ui;font-size:15px;font-weight:600;color:#bd93f9;margin-right:2px;letter-spacing:-.3px}
.panel-btns{display:flex;gap:5px;align-items:center}
.panel-btns label{font-size:11px;color:#6272a4;font-family:'Syne',system-ui}
.sp{flex:1}
.hint{font-size:11px;color:#6272a4;font-family:'Syne',system-ui;white-space:nowrap}
.ibtn{padding:5px 11px;background:transparent;border:1px solid #44475a;border-radius:6px;color:#6272a4;font-size:12px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:color .12s,border-color .12s;white-space:nowrap}
.ibtn:hover{color:#f8f8f2;border-color:#6272a4}
.ibtn.on{border-color:#bd93f9;color:#bd93f9}
.ibtn.vis{border-color:#50fa7b;color:#50fa7b}
.rbtn{padding:6px 18px;background:#bd93f9;color:#282a36;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-family:'Syne',system-ui;font-weight:600;transition:background .12s}
.rbtn:hover{background:#cfa9fa}
.rbtn:active{transform:scale(.97)}

#ar-bar{height:2px;background:#44475a;flex-shrink:0;position:relative;overflow:hidden}
#ar-prog{height:100%;width:0%;background:#bd93f9;position:absolute;top:0;left:0}

/* workspace: left editors | vdiv | right preview+console */
#ws{display:flex;flex:1;overflow:hidden;min-height:0}

#left{display:flex;flex-direction:column;width:50%;min-width:80px;overflow:hidden}

/* each editor panel */
.ep{display:flex;flex-direction:column;overflow:hidden;min-height:50px}
.ep.hide{display:none!important}
.ep-hdr{display:flex;align-items:center;gap:8px;padding:5px 12px;background:#21222c;border-bottom:1px solid #44475a;flex-shrink:0;user-select:none}
.dot{width:8px;height:8px;border-radius:50%}
.dot-js{background:#f1fa8c}.dot-html{background:#ff79c6}.dot-css{background:#8be9fd}
.ep-hdr span{font-size:12px;color:#6272a4}
.ew{flex:1;overflow:hidden;min-height:0}

/* horizontal splitter between editor panels */
.hsplit{height:5px;background:#383a4a;flex-shrink:0;cursor:ns-resize;position:relative;z-index:20}
.hsplit:hover{background:#bd93f9}
.hsplit.hide{display:none!important}

/* vertical splitter between left and right */
#vsplit{width:5px;background:#383a4a;flex-shrink:0;cursor:ew-resize;z-index:20}
#vsplit:hover{background:#bd93f9}

#right{display:flex;flex-direction:column;flex:1;min-width:80px;overflow:hidden}
#pvwrap{flex:1;position:relative;overflow:hidden;min-height:60px}
#pv{width:100%;height:100%;border:none;display:block;background:#fff}
/* iframe cover shown during any drag to prevent event swallowing */
#pvcover{display:none;position:absolute;inset:0;z-index:50;cursor:inherit}

#csplit{height:5px;background:#383a4a;flex-shrink:0;cursor:ns-resize;z-index:20}
#csplit:hover{background:#bd93f9}

#console{display:flex;flex-direction:column;height:180px;min-height:40px;overflow:hidden}
#cbr{display:flex;align-items:center;padding:6px 14px;background:#21222c;border-bottom:1px solid #44475a;flex-shrink:0;gap:8px}
#cbr .lbl{font-size:11px;color:#6272a4;font-family:'Syne',system-ui;text-transform:uppercase;letter-spacing:.8px;flex:1}
#co{flex:1;overflow-y:auto;padding:8px 14px;font-size:13.5px;line-height:1.8;background:#282a36}
.lg{color:#f8f8f2}.lw{color:#ffb86c}.le{color:#ff5555}.li{color:#8be9fd}
.ll{display:flex;gap:10px;padding:1px 0}.lp{color:#6272a4;flex-shrink:0;font-size:12px}
#sd{width:8px;height:8px;border-radius:50%;background:#6272a4;flex-shrink:0;transition:background .25s}
#sd.run{background:#ffb86c}#sd.ok{background:#50fa7b}#sd.err{background:#ff5555}

/* CodeMirror Dracula */
.ew .CodeMirror{height:100%!important;font-family:'JetBrains Mono',monospace!important;font-size:14.5px!important;line-height:1.75!important;background:#282a36!important;color:#f8f8f2!important}
.ew .CodeMirror-gutters{background:#21222c!important;border-right:1px solid #44475a!important;min-width:50px!important}
.ew .CodeMirror-linenumber{color:#6272a4!important;font-size:12px!important;padding:0 10px 0 6px!important}
.ew .CodeMirror-cursor{border-left:2px solid #f8f8f2!important}
.ew .CodeMirror-selected{background:#44475a80!important}
.ew .CodeMirror-activeline-background{background:#ffffff05!important}
.ew .CodeMirror-matchingbracket{color:#ff79c6!important;font-weight:bold!important}
.ew .cm-keyword{color:#ff79c6!important}
.ew .cm-def{color:#50fa7b!important}
.ew .cm-variable{color:#f8f8f2!important}
.ew .cm-variable-2{color:#8be9fd!important}
.ew .cm-variable-3{color:#ffb86c!important}
.ew .cm-property{color:#8be9fd!important}
.ew .cm-operator{color:#ff79c6!important}
.ew .cm-number{color:#bd93f9!important}
.ew .cm-string{color:#f1fa8c!important}
.ew .cm-string-2{color:#f1fa8c!important}
.ew .cm-comment{color:#6272a4!important;font-style:italic!important}
.ew .cm-atom{color:#bd93f9!important}
.ew .cm-builtin{color:#50fa7b!important}
.ew .cm-tag{color:#ff79c6!important}
.ew .cm-attribute{color:#50fa7b!important}
.ew .cm-qualifier{color:#50fa7b!important}
.ew .cm-bracket{color:#f8f8f2!important}
.ew .cm-error{background:#ff555430!important;color:#ff5555!important}
.CodeMirror-hints{background:#21222c!important;border:1px solid #6272a4!important;border-radius:8px!important;font-family:'JetBrains Mono',monospace!important;font-size:13px!important;color:#f8f8f2!important;z-index:9999!important;padding:4px!important}
.CodeMirror-hint{color:#f8f8f2!important;padding:5px 14px!important;border-radius:4px!important}
.CodeMirror-hint-active{background:#44475a!important;color:#bd93f9!important}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#44475a;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#6272a4}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/javascript-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/html-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/css-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closetag.min.js"></script>
</head>
<body>

<div id="bar">
  <span id="logo">⬡ playground</span>
  <div class="panel-btns">
    <label>panels:</label>
    <button class="ibtn vis" id="tog-js">JS</button>
    <button class="ibtn vis" id="tog-html">HTML</button>
    <button class="ibtn vis" id="tog-css">CSS</button>
  </div>
  <div class="sp"></div>
  <span class="hint">Tab=Emmet · Ctrl+Space=autocomplete</span>
  <div class="sp"></div>
  <button class="ibtn on" id="ar-btn">auto-run</button>
  <button class="ibtn" id="clr-btn">clear</button>
  <button class="rbtn" id="run-btn">▶ run</button>
</div>
<div id="ar-bar"><div id="ar-prog"></div></div>

<div id="ws">
  <div id="left">
    <div class="ep" id="ep-js">
      <div class="ep-hdr"><div class="dot dot-js"></div><span>script.js</span></div>
      <div class="ew" id="ew-js"></div>
    </div>
    <div class="hsplit" id="hs1"></div>
    <div class="ep" id="ep-html">
      <div class="ep-hdr"><div class="dot dot-html"></div><span>index.html</span></div>
      <div class="ew" id="ew-html"></div>
    </div>
    <div class="hsplit" id="hs2"></div>
    <div class="ep" id="ep-css">
      <div class="ep-hdr"><div class="dot dot-css"></div><span>style.css</span></div>
      <div class="ew" id="ew-css"></div>
    </div>
  </div>

  <div id="vsplit"></div>

  <div id="right">
    <div id="pvwrap">
      <iframe id="pv" sandbox="allow-scripts"></iframe>
      <div id="pvcover"></div>
    </div>
    <div id="csplit"></div>
    <div id="console">
      <div id="cbr">
        <span class="lbl">console</span>
        <div id="sd"></div>
        <button class="ibtn" id="clrc-btn">clear</button>
      </div>
      <div id="co"></div>
    </div>
  </div>
</div>

<script>
/* ── Default code ── */
const CODE = {
  js: `// Edit all three panels at once — drag the dividers to resize!
// Ctrl+Space = autocomplete  |  shorthand + Tab = Emmet

const canvas = document.createElement('canvas');
canvas.width = 400; canvas.height = 300;
document.body.appendChild(canvas);
const ctx = canvas.getContext('2d');
let t = 0;
function draw() {
  ctx.clearRect(0, 0, 400, 300);
  for (let i = 0; i < 8; i++) {
    const a = (i/8)*Math.PI*2 + t;
    const x = 200 + Math.cos(a)*(80 + Math.sin(t*1.5+i)*30);
    const y = 150 + Math.sin(a)*(80 + Math.cos(t*1.5+i)*30);
    ctx.beginPath();
    ctx.arc(x, y, 18, 0, Math.PI*2);
    ctx.fillStyle = \`hsl(\${(i/8*360+t*30)%360},80%,65%)\`;
    ctx.fill();
  }
  t += 0.025;
  requestAnimationFrame(draw);
}
draw();
console.log('Drag the dividers to resize any panel!');`,
  html: `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Preview</title>
</head>
<body>
  <!-- Try typing "h1" then Tab -->
</body>
</html>`,
  css: `/* "df"+Tab = display:flex  "aic"+Tab = align-items:center */
body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  background: #282a36;
}
canvas { border-radius: 12px; }`
};

/* ── Emmet ── */
const EH = {
  '!':'<!DOCTYPE html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n  <title>|</title>\n</head>\n<body>\n  \n</body>\n</html>',
  'div':'<div>|</div>','span':'<span>|</span>','p':'<p>|</p>','a':'<a href="|"></a>',
  'img':'<img src="|" alt="">','ul':'<ul>\n  <li>|</li>\n</ul>','ol':'<ol>\n  <li>|</li>\n</ol>',
  'li':'<li>|</li>','h1':'<h1>|</h1>','h2':'<h2>|</h2>','h3':'<h3>|</h3>',
  'h4':'<h4>|</h4>','h5':'<h5>|</h5>','h6':'<h6>|</h6>',
  'section':'<section>|</section>','article':'<article>|</article>',
  'header':'<header>|</header>','footer':'<footer>|</footer>','nav':'<nav>|</nav>','main':'<main>|</main>',
  'form':'<form action="|" method="post"></form>','input':'<input type="text" name="|" placeholder="">',
  'button':'<button type="button">|</button>','canvas':'<canvas id="|" width="400" height="300"></canvas>',
  'select':'<select name="|"><option value=""></option></select>','textarea':'<textarea name="|" rows="4"></textarea>',
  'table':'<table>\n  <tr>\n    <td>|</td>\n  </tr>\n</table>',
  'link':'<link rel="stylesheet" href="|">','script':'<script src="|"><\/script>','meta':'<meta name="|" content="">',
};
const EC = {
  'm':'margin: |;','mt':'margin-top: |;','mr':'margin-right: |;','mb':'margin-bottom: |;','ml':'margin-left: |;',
  'p':'padding: |;','pt':'padding-top: |;','pr':'padding-right: |;','pb':'padding-bottom: |;','pl':'padding-left: |;',
  'w':'width: |;','h':'height: |;','mw':'max-width: |;','wf':'width: 100%;','hf':'height: 100%;',
  'bg':'background: |;','bgc':'background-color: |;','c':'color: |;','fs':'font-size: |;',
  'fw':'font-weight: |;','ff':'font-family: |;','lh':'line-height: |;',
  'df':'display: flex;','dg':'display: grid;','dn':'display: none;','db':'display: block;','dib':'display: inline-block;',
  'jcc':'justify-content: center;','jcsb':'justify-content: space-between;','jcsa':'justify-content: space-around;',
  'aic':'align-items: center;','aifs':'align-items: flex-start;','aife':'align-items: flex-end;',
  'fdc':'flex-direction: column;','f1':'flex: 1;','fww':'flex-wrap: wrap;',
  'posa':'position: absolute;','posr':'position: relative;','posf':'position: fixed;','poss':'position: sticky;',
  't':'top: |;','r':'right: |;','b':'bottom: |;','l':'left: |;',
  'br':'border-radius: |;','brd':'border: 1px solid |;','bn':'border: none;',
  'tac':'text-align: center;','tar':'text-align: right;','tdn':'text-decoration: none;','ttu':'text-transform: uppercase;',
  'ovh':'overflow: hidden;','ova':'overflow: auto;','curp':'cursor: pointer;',
  'op':'opacity: |;','z':'z-index: |;','tra':'transition: all 0.3s ease;','bs':'box-shadow: |;','gap':'gap: |;','gtc':'grid-template-columns: |;',
};

function doEmmet(cm, lang) {
  const cur = cm.getCursor();
  const before = cm.getLine(cur.line).slice(0, cur.ch);
  const m = before.match(/[\w!]+$/);
  if (!m) return false;
  const tpl = (lang === 'css' ? EC : EH)[m[0]];
  if (!tpl) return false;
  const from = { line: cur.line, ch: cur.ch - m[0].length };
  const ci = tpl.indexOf('|');
  const expanded = tpl.replace('|', '');
  const lines = expanded.split('\n');
  let tl = from.line, tc = from.ch, left = ci >= 0 ? ci : expanded.length;
  for (let i = 0; i < lines.length; i++) {
    if (left <= lines[i].length) { tl = from.line + i; tc = (i === 0 ? from.ch : 0) + left; break; }
    left -= lines[i].length + 1;
  }
  cm.replaceRange(expanded, from, cur);
  cm.setCursor({ line: tl, ch: tc });
  return true;
}

/* ── Build editors ── */
const codes = { js: CODE.js, html: CODE.html, css: CODE.css };
const modeMap = { js: { name: 'javascript', globalVars: true }, html: 'htmlmixed', css: 'css' };
const eds = {};

function makeEd(lang) {
  const cm = CodeMirror(document.getElementById('ew-' + lang), {
    value: codes[lang], mode: modeMap[lang],
    lineNumbers: true, autoCloseBrackets: true,
    matchBrackets: true, autoCloseTags: true,
    lineWrapping: false,
    extraKeys: {
      'Ctrl-Space': 'autocomplete',
      'Tab': cm => { if (!doEmmet(cm, lang)) cm.execCommand('indentMore'); }
    }
  });
  cm.on('change', (_, ch) => {
    codes[lang] = cm.getValue();
    if (ch.origin !== 'setValue') scheduleRun();
  });
  cm.on('inputRead', () => {
    const hf = lang === 'js' ? CodeMirror.hint.javascript : lang === 'css' ? CodeMirror.hint.css : CodeMirror.hint.html;
    cm.showHint({ hint: hf, completeSingle: false });
  });
  return cm;
}
eds.js   = makeEd('js');
eds.html = makeEd('html');
eds.css  = makeEd('css');

/* ── Panel toggles ── */
const vis = { js: true, html: true, css: true };
function updatePanels() {
  ['js','html','css'].forEach(l => {
    document.getElementById('ep-' + l).classList.toggle('hide', !vis[l]);
  });
  document.getElementById('hs1').classList.toggle('hide', !(vis.js && vis.html));
  document.getElementById('hs2').classList.toggle('hide', !(vis.html && vis.css));
  // Reset flex so panels share space equally after toggle
  ['js','html','css'].forEach(l => {
    const ep = document.getElementById('ep-' + l);
    ep.style.flex = '1';
    ep.style.height = '';
  });
  setTimeout(() => Object.values(eds).forEach(cm => cm.refresh()), 0);
}
['js','html','css'].forEach(l => {
  document.getElementById('tog-' + l).addEventListener('click', () => {
    vis[l] = !vis[l];
    document.getElementById('tog-' + l).classList.toggle('vis', vis[l]);
    updatePanels();
  });
});

/* ══════════════════════════════════════════════
   RESIZE — single global drag state, one handler
══════════════════════════════════════════════ */
const pvcover = document.getElementById('pvcover');
let drag = null; // { type, startX/Y, ... }

function startDrag(type, e, extra) {
  e.preventDefault();
  drag = { type, startX: e.clientX, startY: e.clientY, ...extra };
  pvcover.style.display = 'block';           // block iframe stealing events
  document.body.style.userSelect = 'none';
  document.body.style.cursor =
    (type === 'v' ? 'ew-resize' : 'ns-resize');
}

document.getElementById('vsplit').addEventListener('mousedown', e => {
  const left = document.getElementById('left');
  startDrag('v', e, { startW: left.getBoundingClientRect().width });
});

document.getElementById('hs1').addEventListener('mousedown', e => {
  const a = document.getElementById('ep-js');
  const b = document.getElementById('ep-html');
  startDrag('h1', e, { startA: a.getBoundingClientRect().height, startB: b.getBoundingClientRect().height });
});

document.getElementById('hs2').addEventListener('mousedown', e => {
  const a = document.getElementById('ep-html');
  const b = document.getElementById('ep-css');
  startDrag('h2', e, { startA: a.getBoundingClientRect().height, startB: b.getBoundingClientRect().height });
});

document.getElementById('csplit').addEventListener('mousedown', e => {
  const con = document.getElementById('console');
  startDrag('c', e, { startH: con.getBoundingClientRect().height });
});

document.addEventListener('mousemove', e => {
  if (!drag) return;

  if (drag.type === 'v') {
    const left = document.getElementById('left');
    const ws = document.getElementById('ws');
    const wsW = ws.getBoundingClientRect().width;
    const dx = e.clientX - drag.startX;
    const newW = Math.max(120, Math.min(wsW - 120, drag.startW + dx));
    left.style.width = newW + 'px';
    left.style.flex = 'none';
    Object.values(eds).forEach(cm => cm.refresh());
    return;
  }

  if (drag.type === 'h1') {
    const a = document.getElementById('ep-js');
    const b = document.getElementById('ep-html');
    const dy = e.clientY - drag.startY;
    const total = drag.startA + drag.startB;
    const newA = Math.max(50, Math.min(total - 50, drag.startA + dy));
    a.style.flex = 'none';
    a.style.height = newA + 'px';
    b.style.flex = '1';
    b.style.height = '';
    Object.values(eds).forEach(cm => cm.refresh());
    return;
  }

  if (drag.type === 'h2') {
    const a = document.getElementById('ep-html');
    const b = document.getElementById('ep-css');
    const dy = e.clientY - drag.startY;
    const total = drag.startA + drag.startB;
    const newA = Math.max(50, Math.min(total - 50, drag.startA + dy));
    a.style.flex = 'none';
    a.style.height = newA + 'px';
    b.style.flex = '1';
    b.style.height = '';
    Object.values(eds).forEach(cm => cm.refresh());
    return;
  }

  if (drag.type === 'c') {
    const con = document.getElementById('console');
    const dy = e.clientY - drag.startY;
    const newH = Math.max(40, Math.min(600, drag.startH - dy));
    con.style.height = newH + 'px';
    con.style.flex = 'none';
  }
});

document.addEventListener('mouseup', () => {
  if (!drag) return;
  drag = null;
  pvcover.style.display = 'none';
  document.body.style.userSelect = '';
  document.body.style.cursor = '';
});

/* ── Auto-run ── */
const prog = document.getElementById('ar-prog');
const arBtn = document.getElementById('ar-btn');
let autoRun = true, arTimer = null;
const DELAY = 1200;

function scheduleRun() {
  if (!autoRun) return;
  clearTimeout(arTimer);
  prog.style.transition = 'none'; prog.style.width = '0%';
  requestAnimationFrame(() => {
    prog.style.transition = `width ${DELAY}ms linear`;
    prog.style.width = '100%';
  });
  arTimer = setTimeout(() => { prog.style.transition = 'none'; prog.style.width = '0%'; run(); }, DELAY);
}

arBtn.addEventListener('click', () => {
  autoRun = !autoRun;
  arBtn.classList.toggle('on', autoRun);
  if (!autoRun) { clearTimeout(arTimer); prog.style.width = '0%'; }
});

/* ── Run ── */
const co = document.getElementById('co');
const sd = document.getElementById('sd');
const pv = document.getElementById('pv');

function addLog(cls, txt) {
  const d = document.createElement('div'); d.className = 'll';
  const p = document.createElement('span'); p.className = 'lp';
  p.textContent = cls === 'le' ? '✕' : cls === 'lw' ? '!' : cls === 'li' ? 'i' : '›';
  const s = document.createElement('span'); s.className = cls; s.textContent = txt;
  d.appendChild(p); d.appendChild(s); co.appendChild(d);
  co.scrollTop = co.scrollHeight;
}
function clearCo() { co.innerHTML = ''; sd.className = ''; }

function run() {
  Object.keys(codes).forEach(l => { codes[l] = eds[l].getValue(); });
  clearCo(); sd.className = 'run';
  const ic = `<script>
    const _f=x=>{try{return typeof x==='object'?JSON.stringify(x,null,2):String(x)}catch{return String(x)}};
    const _l=(t,...a)=>window.parent.postMessage({type:'con',lv:t,tx:a.map(_f).join(' ')},'*');
    console.log=(...a)=>_l('lg',...a);console.warn=(...a)=>_l('lw',...a);
    console.error=(...a)=>_l('le',...a);console.info=(...a)=>_l('li',...a);
    window.onerror=(m,s,l)=>{_l('le',m+' (line '+l+')');return true;};
  <\/script>`;
  let base = codes.html;
  if (!base.includes('<html')) base = `<!DOCTYPE html><html><head></head><body>${base}</body></html>`;
  const final = base
    .replace('</head>', `<style>${codes.css}</style></head>`)
    .replace('<head>', '<head>' + ic)
    .replace('</body>', `<script>\n${codes.js}\n<\/script></body>`);
  pv.srcdoc = final;
  setTimeout(() => { if (sd.className === 'run') sd.className = 'ok'; }, 700);
}

window.addEventListener('message', e => {
  if (e.data?.type === 'con') {
    addLog(e.data.lv, e.data.tx);
    if (e.data.lv === 'le') sd.className = 'err';
  }
});

document.getElementById('run-btn').addEventListener('click', run);
document.getElementById('clr-btn').addEventListener('click', () => {
  Object.keys(codes).forEach(l => { codes[l] = ''; eds[l].setValue(''); });
});
document.getElementById('clrc-btn').addEventListener('click', clearCo);

run();
</script>
</body>
</html>
